version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: skillsctl
    main: ./cli
    binary: skillsctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/nebari-dev/skillsctl/cli/cmd.version={{.Version}}
      - -X github.com/nebari-dev/skillsctl/cli/cmd.commit={{.ShortCommit}}

  - id: skillsctl-server
    main: ./backend/cmd/server
    binary: skillsctl-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: skillsctl
    builds:
      - skillsctl
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "skillsctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: skillsctl-server
    builds:
      - skillsctl-server
    format: tar.gz
    name_template: "skillsctl-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: nebari-dev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/nebari-dev/skillsctl
    description: CLI for discovering, installing, and publishing Claude Code skills
    license: MIT
    install: |
      bin.install "skillsctl"
    test: |
      system "#{bin}/skillsctl", "--version"
