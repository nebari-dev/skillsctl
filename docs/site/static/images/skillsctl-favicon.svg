<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2A1480"/>
      <stop offset="100%" stop-color="#1A0D52"/>
    </linearGradient>
    <linearGradient id="nebula" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7B4FD4"/>
      <stop offset="40%"  stop-color="#C44B7A"/>
      <stop offset="75%"  stop-color="#F07030"/>
      <stop offset="100%" stop-color="#F5B830"/>
    </linearGradient>
  </defs>

  <!-- Dark background tile -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Simplified shield outline -->
  <path d="M16 2 L28 5.5 L28 18 Q28 28 16 31 Q4 28 4 18 L4 5.5 Z"
        fill="none"
        stroke="url(#nebula)"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Terminal ">" -->
  <text x="6.5" y="19"
        font-family="'Courier New', monospace"
        font-size="9"
        font-weight="900"
        fill="url(#nebula)">&#62;</text>

  <!-- Short connector -->
  <line x1="14" y1="17.5" x2="17.5" y2="17.5"
        stroke="url(#nebula)"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Mini honeycomb: 2 small hexagons -->
  <polygon points="21,10 23.5,11.5 23.5,14.5 21,16 18.5,14.5 18.5,11.5"
           fill="none" stroke="url(#nebula)" stroke-width="1.3"/>
  <polygon points="24.5,14.5 27,16 27,19 24.5,20.5 22,19 22,16"
           fill="none" stroke="url(#nebula)" stroke-width="1.3"/>

  <!-- Mini gear -->
  <g transform="translate(14.5, 20)">
    <circle cx="4" cy="4" r="2.8" fill="none" stroke="url(#nebula)" stroke-width="1.2"/>
    <circle cx="4" cy="4" r="1.2" fill="none" stroke="url(#nebula)" stroke-width="1"/>
    <g stroke="url(#nebula)" stroke-width="1.2" stroke-linecap="round">
      <line x1="4" y1="0.8" x2="4" y2="0"/>
      <line x1="4" y1="7.2" x2="4" y2="8"/>
      <line x1="0.8" y1="4" x2="0"  y2="4"/>
      <line x1="7.2" y1="4" x2="8"  y2="4"/>
      <line x1="1.7" y1="1.7" x2="1.1" y2="1.1"/>
      <line x1="6.3" y1="6.3" x2="6.9" y2="6.9"/>
      <line x1="6.3" y1="1.7" x2="6.9" y2="1.1"/>
      <line x1="1.7" y1="6.3" x2="1.1" y2="6.9"/>
    </g>
  </g>
</svg>
